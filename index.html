<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>競艇予想AI</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="競艇AI">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#2196f3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080f;
  --card: rgba(17,24,42,0.75);
  --card2: rgba(22,32,56,0.6);
  --text: #e8eaf0;
  --dim: #8892a4;
  --border: rgba(255,255,255,0.08);
  --blue: #2196f3;
  --gold: #ffc107;
  --silver: #b0bec5;
  --bronze: #ff8a65;
  --green: #00c853;
  --red: #ff5252;
  --cyan: #4dd0e1;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse 80% 50% at 15% 20%, rgba(33,150,243,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 75%, rgba(0,200,83,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 40% 30% at 50% 100%, rgba(255,193,7,0.05) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 8px 80px; }

/* Header */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 4px 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
}
.app-header h1 { font-size: 17px; font-weight: 900; }
.app-header h1 .accent { color: var(--blue); }
.header-right { display: flex; gap: 8px; align-items: center; }
.update-time { font-size: 10px; color: var(--dim); }
.back-btn {
  padding: 6px 12px; background: var(--card2); color: var(--cyan);
  border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
}
.refresh-btn {
  padding: 6px 12px;
  background: linear-gradient(135deg, rgba(33,150,243,0.2), rgba(0,200,83,0.1));
  color: var(--cyan); border: 1px solid rgba(77,208,225,0.2); border-radius: 8px;
  cursor: pointer; font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
}

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--dim); }
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--cyan); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Stadium cards */
.stadium-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stadium-card {
  background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border); border-radius: 14px;
  padding: 14px; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 2px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
}
.stadium-card:active { transform: scale(0.97); }
.stadium-name { font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.stadium-event { font-size: 11px; color: var(--dim); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stadium-progress { font-size: 11px; color: var(--cyan); }

/* Race list */
.race-list { display: flex; flex-direction: column; gap: 6px; }
.race-item {
  background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 14px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
}
.race-item:active { transform: scale(0.98); }
.race-num { font-size: 16px; font-weight: 900; min-width: 36px; }
.race-name { flex: 1; font-size: 13px; color: var(--dim); margin-left: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.race-status {
  font-size: 10px; padding: 3px 8px; border-radius: 8px; font-weight: 700;
}
.status-before { background: rgba(33,150,243,0.15); color: var(--blue); }
.status-preview { background: rgba(255,193,7,0.15); color: var(--gold); }
.status-done { background: rgba(0,200,83,0.15); color: var(--green); }
.race-result { font-size: 12px; font-weight: 700; color: var(--gold); margin-left: 8px; }

/* Race detail */
.race-header {
  background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border); border-radius: 14px;
  padding: 12px; margin-bottom: 10px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
}
.race-title { font-size: 16px; font-weight: 900; margin-bottom: 6px; }
.weather-bar {
  display: flex; flex-wrap: wrap; gap: 8px; font-size: 11px; color: var(--dim);
}
.weather-item { display: flex; align-items: center; gap: 3px; }

/* Boat cards */
.boat-card {
  background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border); border-radius: 14px;
  padding: 10px 12px; margin-bottom: 6px;
  display: flex; align-items: flex-start; gap: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
}
.boat-num {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; flex-shrink: 0;
}
.boat-info { flex: 1; min-width: 0; }
.boat-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.boat-name { font-size: 14px; font-weight: 700; }
.boat-class {
  font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 700;
}
.class-a1 { background: rgba(255,193,7,0.2); color: var(--gold); }
.class-a2 { background: rgba(33,150,243,0.2); color: var(--blue); }
.class-b1 { background: rgba(255,255,255,0.08); color: var(--dim); }
.class-b2 { background: rgba(255,82,82,0.15); color: var(--red); }
.boat-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px 8px;
  font-size: 10px; color: var(--dim);
}
.boat-stats .val { color: var(--text); font-weight: 500; }
.boat-score-bar {
  width: 60px; height: 28px; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; flex-shrink: 0; border-radius: 8px;
}

/* AI Prediction section */
.ai-section {
  background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(33,150,243,0.2); border-radius: 16px;
  padding: 14px; margin-top: 10px;
  box-shadow: 0 4px 24px rgba(33,150,243,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
}
.ai-title {
  font-size: 14px; font-weight: 900; color: var(--blue); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.prediction-row {
  display: flex; gap: 6px; margin-bottom: 12px; justify-content: center;
}
.pred-boat {
  width: 40px; height: 44px; border-radius: 10px; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
}
.pred-rank { font-size: 9px; font-weight: 700; opacity: 0.7; }
.pred-num { font-size: 18px; font-weight: 900; }
.confidence-bar {
  text-align: center; padding: 8px; border-radius: 10px;
  font-size: 12px; font-weight: 700; margin-bottom: 10px;
}
.bet-section {
  background: var(--card2); border-radius: 10px; padding: 10px; margin-bottom: 8px;
}
.bet-title { font-size: 11px; color: var(--dim); margin-bottom: 6px; }
.bet-items { display: flex; flex-wrap: wrap; gap: 4px; }
.bet-item {
  font-size: 11px; padding: 3px 8px; background: rgba(255,255,255,0.06);
  border-radius: 6px; font-weight: 500;
}
.score-breakdown {
  font-size: 10px; color: var(--dim); margin-top: 8px;
}
.score-breakdown table { width: 100%; border-collapse: collapse; }
.score-breakdown th {
  text-align: left; padding: 4px; border-bottom: 1px solid var(--border);
  font-weight: 500; color: var(--dim); font-size: 10px;
}
.score-breakdown td {
  padding: 4px; border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 10px;
}

/* No races */
.no-data {
  text-align: center; padding: 60px 20px; color: var(--dim); font-size: 14px;
}

/* Section title */
.section-title {
  font-size: 12px; color: var(--dim); margin: 12px 0 6px; padding-left: 4px;
}

/* Error toast */
.error-toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(42,16,32,0.95); border: 1px solid var(--red); color: var(--red);
  padding: 8px 16px; border-radius: 10px; font-size: 12px; z-index: 100;
  display: none; backdrop-filter: blur(8px);
}

/* Footer disclaimer */
.disclaimer {
  text-align: center; font-size: 9px; color: #4a5060;
  padding: 16px 0; border-top: 1px solid var(--border); margin-top: 16px;
}

.hidden { display: none; }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="app-header" id="appHeader">
    <h1>&#x1F6A4; <span class="accent">&#31478;&#33351;&#20104;&#24819;</span>AI</h1>
    <div class="header-right">
      <span class="update-time" id="updateTime"></span>
      <button class="back-btn hidden" id="backBtn" onclick="goBack()">&#x2190; &#25147;&#12427;</button>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">&#x21BB;</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading hidden" id="loading"><div class="spinner"></div>&#12487;&#12540;&#12479;&#21462;&#24471;&#20013;...</div>

  <!-- Screen: Stadium list -->
  <div id="screenStadiums"></div>

  <!-- Screen: Race list -->
  <div id="screenRaces" class="hidden"></div>

  <!-- Screen: Race detail -->
  <div id="screenDetail" class="hidden"></div>

  <div class="disclaimer">
    &#9888;&#65039; &#20104;&#24819;&#12399;&#32113;&#35336;&#12514;&#12487;&#12523;&#12395;&#12424;&#12427;&#21442;&#32771;&#24773;&#22577;&#12391;&#12377;&#12290;&#30340;&#20013;&#12434;&#20445;&#35388;&#12377;&#12427;&#12418;&#12398;&#12391;&#12399;&#12354;&#12426;&#12414;&#12379;&#12435;&#12290;<br>
    &#33311;&#21048;&#12398;&#36092;&#20837;&#12399;&#33258;&#24049;&#36012;&#20219;&#12391;&#34892;&#12387;&#12390;&#12367;&#12384;&#12373;&#12356;&#12290;BoatraceOpenAPI&#20351;&#29992;&#12290;
  </div>
</div>

<div class="error-toast" id="errorToast"></div>

<script>
// ============================================================
// Constants
// ============================================================
const STADIUMS = {
  "01":"桐生","02":"戸田","03":"江戸川","04":"平和島",
  "05":"多摩川","06":"浜名湖","07":"蒲郡","08":"常滑",
  "09":"津","10":"三国","11":"びわこ","12":"住之江",
  "13":"尼崎","14":"鳴門","15":"丸亀","16":"児島",
  "17":"宮島","18":"徳山","19":"下関","20":"若松",
  "21":"芦屋","22":"福岡","23":"唐津","24":"大村"
};

const BOAT_COLORS = {
  1: {bg:"#FFFFFF", text:"#000000", border:"#888"},
  2: {bg:"#1a1a1a", text:"#FFFFFF", border:"#444"},
  3: {bg:"#E8333F", text:"#FFFFFF", border:"transparent"},
  4: {bg:"#0068B7", text:"#FFFFFF", border:"transparent"},
  5: {bg:"#FFD700", text:"#000000", border:"transparent"},
  6: {bg:"#00A550", text:"#FFFFFF", border:"transparent"},
};

const COURSE_BASE = {1:50, 2:18, 3:13, 4:10, 5:6, 6:3};
const CLASS_BONUS = {"A1":8, "A2":4, "B1":0, "B2":-4};

const API_BASE = 'https://boatraceopenapi.github.io';

// API actual field mapping:
// programs.programs[] -> race_stadium_number(int), race_number(int), race_title, race_subtitle, boats[]
// boats[] -> racer_boat_number, racer_name, racer_class_number(1=A1,2=A2,3=B1,4=B2),
//            racer_weight, racer_national_top_1_percent, racer_national_top_2_percent,
//            racer_local_top_1_percent, racer_local_top_2_percent,
//            racer_assigned_motor_top_2_percent, racer_assigned_boat_top_2_percent,
//            racer_number, racer_branch_number
// previews.previews[] -> race_stadium_number, race_number, race_wind, race_wave,
//            race_weather_number, race_temperature, race_water_temperature,
//            boats(object {"1":{...},...}) -> racer_exhibition_time, racer_tilt_adjustment
// results.results[] -> race_stadium_number, race_number,
//            boats[] -> racer_boat_number, racer_place_number, racer_name, racer_start_timing

const CLASS_MAP = {1:"A1", 2:"A2", 3:"B1", 4:"B2"};
const WEATHER_MAP = {1:"晴", 2:"曇り", 3:"雨", 4:"雪", 5:"霧"};
const BRANCH_MAP = {
  1:"群馬",2:"埼玉",3:"東京",4:"静岡",5:"愛知",6:"三重",7:"福井",8:"滋賀",
  9:"大阪",10:"兵庫",11:"徳島",12:"香川",13:"岡山",14:"広島",15:"山口",
  16:"福岡",17:"佐賀",18:"長崎",19:"熊本",20:"大分",21:"宮崎",22:"鹿児島",
  23:"東京2",24:"千葉",25:"神奈川",26:"岐阜",27:"京都",28:"奈良",29:"和歌山",
  30:"鳥取",31:"島根",32:"愛媛",33:"高知",34:"北海道",35:"青森",36:"岩手",
  37:"宮城",38:"秋田",39:"山形",40:"福島",41:"茨城",42:"栃木",43:"新潟",
  44:"富山",45:"石川",46:"山梨",47:"長野"
};

let programData = null;  // {programs: [...]}
let previewData = null;  // {previews: [...]}
let resultData = null;   // {results: [...]}
let currentStadium = null;
let currentRace = null;

// Helper: get race lists from API response
function getPrograms() { return (programData && programData.programs) || []; }
function getPreviews() { return (previewData && previewData.previews) || []; }
function getResults() { return (resultData && resultData.results) || []; }

function matchRace(r, stadiumNum, raceNum) {
  return r.race_stadium_number == stadiumNum && r.race_number == raceNum;
}

// ============================================================
// Data fetching
// ============================================================
async function fetchJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function loadAllData() {
  showLoading(true);
  try {
    const [prog, prev, res] = await Promise.allSettled([
      fetchJSON(`${API_BASE}/programs/v2/today.json`),
      fetchJSON(`${API_BASE}/previews/v2/today.json`),
      fetchJSON(`${API_BASE}/results/v2/today.json`),
    ]);
    programData = prog.status === 'fulfilled' ? prog.value : null;
    previewData = prev.status === 'fulfilled' ? prev.value : null;
    resultData = res.status === 'fulfilled' ? res.value : null;

    if (!programData || !programData.programs || !programData.programs.length)
      throw new Error('\u51FA\u8D70\u8868\u30C7\u30FC\u30BF\u3092\u53D6\u5F97\u3067\u304D\u307E\u305B\u3093');

    try {
      localStorage.setItem('br_prog', JSON.stringify(programData));
      localStorage.setItem('br_prev', JSON.stringify(previewData));
      localStorage.setItem('br_res', JSON.stringify(resultData));
    } catch(e) {}

    document.getElementById('updateTime').textContent =
      new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) + ' \u66F4\u65B0';
    renderCurrentScreen();
  } catch(e) {
    try {
      const cached = localStorage.getItem('br_prog');
      if (cached) {
        programData = JSON.parse(cached);
        previewData = JSON.parse(localStorage.getItem('br_prev') || 'null');
        resultData = JSON.parse(localStorage.getItem('br_res') || 'null');
        document.getElementById('updateTime').textContent = '\u30AD\u30E3\u30C3\u30B7\u30E5';
        renderCurrentScreen();
      } else {
        document.getElementById('screenStadiums').innerHTML =
          '<div class="no-data">\u30C7\u30FC\u30BF\u53D6\u5F97\u5931\u6557: ' + e.message + '</div>';
      }
    } catch(e2) { showError(e.message); }
  } finally {
    showLoading(false);
  }
}

function showLoading(v) { document.getElementById('loading').classList.toggle('hidden', !v); }
function showError(msg) {
  const el = document.getElementById('errorToast');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// ============================================================
// Navigation
// ============================================================
function showScreen(name) {
  ['screenStadiums','screenRaces','screenDetail'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));
  document.getElementById('screen' + name).classList.remove('hidden');
  document.getElementById('backBtn').classList.toggle('hidden', name === 'Stadiums');
  window.scrollTo(0, 0);
}

function goBack() {
  if (currentRace !== null) { currentRace = null; showRaces(currentStadium); }
  else if (currentStadium !== null) { currentStadium = null; renderStadiums(); }
}

function renderCurrentScreen() {
  if (currentRace !== null) showRaceDetail(currentStadium, currentRace);
  else if (currentStadium !== null) showRaces(currentStadium);
  else renderStadiums();
}

function refreshData() { loadAllData(); }

// ============================================================
// Screen 1: Stadium list
// ============================================================
function renderStadiums() {
  showScreen('Stadiums');
  const el = document.getElementById('screenStadiums');
  const programs = getPrograms();
  const results = getResults();

  if (!programs.length) {
    el.innerHTML = '<div class="no-data">\u672C\u65E5\u306E\u958B\u50AC\u306F\u3042\u308A\u307E\u305B\u3093</div>';
    return;
  }

  const stadiumMap = {};
  for (const race of programs) {
    const sn = race.race_stadium_number;
    const code = sn.toString().padStart(2, '0');
    if (!stadiumMap[code]) {
      stadiumMap[code] = {
        code, sn, name: STADIUMS[code] || code,
        event: race.race_title || '',
        raceCount: 0, doneCount: 0
      };
    }
    stadiumMap[code].raceCount++;
    if (results.some(r => matchRace(r, sn, race.race_number))) {
      stadiumMap[code].doneCount++;
    }
  }

  const stadiums = Object.values(stadiumMap).sort((a, b) => parseInt(a.code) - parseInt(b.code));

  el.innerHTML = '<div class="section-title">\u672C\u65E5\u306E\u958B\u50AC\u5834</div><div class="stadium-grid">' +
    stadiums.map(s => `
      <div class="stadium-card" onclick="selectStadium('${s.code}')">
        <div class="stadium-name">${s.name}</div>
        <div class="stadium-event">${s.event || '\u958B\u50AC\u4E2D'}</div>
        <div class="stadium-progress">${s.doneCount}/${s.raceCount}R \u78BA\u5B9A</div>
      </div>
    `).join('') + '</div>';
}

function selectStadium(code) {
  currentStadium = code;
  showRaces(code);
}

// ============================================================
// Screen 2: Race list
// ============================================================
function showRaces(stadiumCode) {
  showScreen('Races');
  const el = document.getElementById('screenRaces');
  const name = STADIUMS[stadiumCode] || stadiumCode;
  const sn = parseInt(stadiumCode);
  const programs = getPrograms();
  const previews = getPreviews();
  const results = getResults();

  const races = programs.filter(r => r.race_stadium_number === sn)
    .sort((a, b) => a.race_number - b.race_number);

  let html = `<div class="section-title">${name} \u2014 \u30EC\u30FC\u30B9\u4E00\u89A7</div><div class="race-list">`;

  for (const race of races) {
    const rn = race.race_number;
    const raceName = race.race_subtitle || race.race_title || '';

    let status = 'before', statusText = '\u30EC\u30FC\u30B9\u524D', resultText = '';

    // Check result
    const res = results.find(r => matchRace(r, sn, rn));
    if (res) {
      status = 'done'; statusText = '\u78BA\u5B9A';
      const boats = res.boats || [];
      const top3 = boats.filter(b => b.racer_place_number <= 3)
        .sort((a, b) => a.racer_place_number - b.racer_place_number);
      if (top3.length) resultText = top3.map(b => b.racer_boat_number).join('-');
    } else if (previews.some(r => matchRace(r, sn, rn))) {
      status = 'preview'; statusText = '\u5C55\u793A\u6E08';
    }

    html += `
      <div class="race-item" onclick="selectRace('${stadiumCode}', ${rn})">
        <span class="race-num">${rn}R</span>
        <span class="race-name">${raceName}</span>
        <span class="race-status status-${status}">${statusText}</span>
        ${resultText ? `<span class="race-result">${resultText}</span>` : ''}
      </div>`;
  }

  html += '</div>';
  el.innerHTML = html;
}

function selectRace(stadiumCode, raceNum) {
  currentRace = raceNum;
  showRaceDetail(stadiumCode, raceNum);
}

// ============================================================
// Screen 3: Race detail + AI prediction
// ============================================================
function showRaceDetail(stadiumCode, raceNum) {
  showScreen('Detail');
  const el = document.getElementById('screenDetail');
  const stadiumName = STADIUMS[stadiumCode] || stadiumCode;
  const sn = parseInt(stadiumCode);

  const race = getPrograms().find(r => matchRace(r, sn, raceNum));
  if (!race) { el.innerHTML = '<div class="no-data">\u30EC\u30FC\u30B9\u30C7\u30FC\u30BF\u304C\u3042\u308A\u307E\u305B\u3093</div>'; return; }

  const preview = getPreviews().find(r => matchRace(r, sn, raceNum)) || null;
  const raceResult = getResults().find(r => matchRace(r, sn, raceNum)) || null;

  // Racers from program (array)
  const racers = race.boats || [];
  // Preview boats (object keyed by boat number string)
  const previewBoats = (preview && preview.boats) ? preview.boats : {};

  let html = '';

  // Race header with weather
  html += `<div class="race-header">
    <div class="race-title">${stadiumName} ${raceNum}R ${race.race_subtitle || race.race_title || ''}</div>
    <div class="weather-bar">`;
  if (preview) {
    if (preview.race_weather_number) html += `<span class="weather-item">\u2600 ${WEATHER_MAP[preview.race_weather_number] || ''}</span>`;
    if (preview.race_wind != null) html += `<span class="weather-item">\uD83D\uDCA8 ${preview.race_wind}m</span>`;
    if (preview.race_wave != null) html += `<span class="weather-item">\uD83C\uDF0A ${preview.race_wave}cm</span>`;
    if (preview.race_temperature != null) html += `<span class="weather-item">\uD83C\uDF21 ${preview.race_temperature}\u2103</span>`;
    if (preview.race_water_temperature != null) html += `<span class="weather-item">\uD83D\uDCA7 \u6C34${preview.race_water_temperature}\u2103</span>`;
  }
  html += `</div></div>`;

  // Collect exhibition times
  const exhibitionTimes = [];
  for (const r of racers) {
    const bn = r.racer_boat_number;
    const pb = previewBoats[bn.toString()] || {};
    const et = parseFloat(pb.racer_exhibition_time || 0);
    if (et > 0) exhibitionTimes.push(et);
  }

  // Calculate scores for all boats
  const boatScores = [];
  for (const r of racers) {
    const bn = r.racer_boat_number;
    const pb = previewBoats[bn.toString()] || {};

    const name = r.racer_name || '';
    const cls = CLASS_MAP[r.racer_class_number] || 'B1';
    const branch = BRANCH_MAP[r.racer_branch_number] || '';
    const weight = r.racer_weight || 0;
    const natWin = r.racer_national_top_1_percent || 0;  // This is actually win rate (1着率)
    const nat2ren = r.racer_national_top_2_percent || 0;
    const localWin = r.racer_local_top_1_percent || 0;
    const local2ren = r.racer_local_top_2_percent || 0;
    const motor = r.racer_assigned_motor_top_2_percent || 0;
    const boat = r.racer_assigned_boat_top_2_percent || 0;
    const et = parseFloat(pb.racer_exhibition_time || 0);
    const tilt = pb.racer_tilt_adjustment != null ? pb.racer_tilt_adjustment : '';
    const regNo = r.racer_number || '';

    // Score calculation
    const course = bn;
    let score = COURSE_BASE[course] || 0;
    const details = {course: COURSE_BASE[course] || 0};

    // Player skill (national win rate * 3)
    const skillScore = natWin * 3;
    score += skillScore;
    details.skill = +skillScore.toFixed(1);

    // National 2-ren
    score += nat2ren * 0.3;

    // Local
    const localScore = localWin * 1.5;
    score += localScore;
    details.local = +localScore.toFixed(1);

    // Motor
    const motorScore = motor * 0.5;
    score += motorScore;
    details.motor = +motorScore.toFixed(1);

    // Boat
    score += boat * 0.3;

    // Exhibition time bonus
    let etBonus = 0;
    if (et > 0 && exhibitionTimes.length >= 3) {
      const sorted = [...new Set(exhibitionTimes)].sort((a, b) => a - b);
      const rank = sorted.indexOf(et) + 1;
      const bonuses = {1:8, 2:5, 3:3, 4:1, 5:0, 6:-2};
      etBonus = bonuses[rank] || 0;
    }
    score += etBonus;
    details.exhibition = etBonus;

    // Class bonus
    const cb = CLASS_BONUS[cls] || 0;
    score += cb;
    details.classBonus = cb;

    // Weight (lighter = advantage, baseline 55kg)
    if (weight > 0) score += (55 - weight) * 0.3;

    boatScores.push({
      bn: course, name, cls, branch, weight, regNo,
      natWin, nat2ren, localWin, local2ren, motor, boat,
      et, tilt,
      score: +score.toFixed(1), details
    });
  }

  // Sort by score for prediction
  const predicted = [...boatScores].sort((a, b) => b.score - a.score);
  const maxScore = predicted[0]?.score || 1;

  // Render boat cards
  html += '<div class="section-title">\u51FA\u8D70\u8868</div>';
  for (const b of boatScores) {
    const c = BOAT_COLORS[b.bn] || BOAT_COLORS[1];
    const clsCls = b.cls === 'A1' ? 'class-a1' : b.cls === 'A2' ? 'class-a2' : b.cls === 'B1' ? 'class-b1' : 'class-b2';
    const rank = predicted.indexOf(b) + 1;
    const barColor = rank === 1 ? 'var(--gold)' : rank === 2 ? 'var(--silver)' : rank === 3 ? 'var(--bronze)' : 'var(--dim)';

    html += `
      <div class="boat-card">
        <div class="boat-num" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${b.bn}</div>
        <div class="boat-info">
          <div class="boat-name-row">
            <span class="boat-name">${b.name}</span>
            <span class="boat-class ${clsCls}">${b.cls}</span>
            <span style="font-size:10px;color:var(--dim)">${b.branch}</span>
          </div>
          <div class="boat-stats">
            <span>\u5168\u56FD <span class="val">${b.natWin || '-'}%</span></span>
            <span>\u5F53\u5730 <span class="val">${b.localWin || '-'}%</span></span>
            <span>\u30E2\u30FC\u30BF\u30FC <span class="val">${b.motor || '-'}%</span></span>
            <span>2\u9023 <span class="val">${b.nat2ren || '-'}%</span></span>
            <span>\u5F533\u9023 <span class="val">${b.local2ren || '-'}%</span></span>
            <span>\u30DC\u30FC\u30C8 <span class="val">${b.boat || '-'}%</span></span>
            ${b.et > 0 ? `<span>\u5C55\u793A <span class="val" style="color:var(--cyan)">${b.et.toFixed(2)}</span></span>` : ''}
            ${b.tilt !== '' ? `<span>\u30C1\u30EB\u30C8 <span class="val">${b.tilt}</span></span>` : ''}
            ${b.weight > 0 ? `<span>\u4F53\u91CD <span class="val">${b.weight}kg</span></span>` : ''}
          </div>
        </div>
        <div class="boat-score-bar" style="background:linear-gradient(135deg,${barColor}33,${barColor}11);color:${barColor}">
          ${b.score}
        </div>
      </div>`;
  }

  // AI Prediction section
  const top3 = predicted.slice(0, 3);
  const gap = predicted.length >= 2 ? predicted[0].score - predicted[1].score : 0;
  let conf, confColor, confText;
  if (gap > 15) { conf = '\u9AD8'; confColor = 'var(--green)'; confText = '\u672C\u547D\u30EC\u30FC\u30B9'; }
  else if (gap > 8) { conf = '\u4E2D'; confColor = 'var(--gold)'; confText = '\u6A19\u6E96'; }
  else { conf = '\u4F4E'; confColor = 'var(--red)'; confText = '\u6DF7\u6226\u30FB\u8352\u308C\u6CE8\u610F'; }

  html += `
    <div class="ai-section">
      <div class="ai-title">\uD83E\uDD16 AI\u4E88\u60F3</div>
      <div class="prediction-row">`;

  for (let i = 0; i < predicted.length; i++) {
    const b = predicted[i];
    const c = BOAT_COLORS[b.bn] || BOAT_COLORS[1];
    const rankLabel = i < 3 ? `${i+1}\u7740` : `${i+1}\u7740`;
    html += `
      <div class="pred-boat" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">
        <span class="pred-rank">${rankLabel}</span>
        <span class="pred-num">${b.bn}</span>
      </div>`;
  }

  html += `</div>
    <div class="confidence-bar" style="background:${confColor}15;color:${confColor};border:1px solid ${confColor}33">
      \u4FE1\u983C\u5EA6: ${conf}\uFF08${confText}\uFF09\u30B9\u30B3\u30A2\u5DEE: ${gap.toFixed(1)}
    </div>`;

  // Bet suggestions
  const t3 = top3.map(b => b.bn);
  const sanrentan = [];
  for (let a = 0; a < 3; a++)
    for (let b = 0; b < 3; b++)
      for (let c = 0; c < 3; c++)
        if (a !== b && b !== c && a !== c) sanrentan.push(`${t3[a]}-${t3[b]}-${t3[c]}`);

  const nirentan = [];
  for (let i = 1; i < top3.length; i++) nirentan.push(`${t3[0]}-${t3[i]}`);

  html += `
    <div class="bet-section">
      <div class="bet-title">\uD83C\uDFAF \u63A8\u5968\u8CB7\u3044\u76EE\uFF083\u9023\u5358BOX\uFF09${sanrentan.length}\u70B9</div>
      <div class="bet-items">${sanrentan.map(s => `<span class="bet-item">${s}</span>`).join('')}</div>
    </div>
    <div class="bet-section">
      <div class="bet-title">\uD83C\uDFAF 2\u9023\u5358\uFF081\u7740\u56FA\u5B9A\uFF09</div>
      <div class="bet-items">${nirentan.map(s => `<span class="bet-item">${s}</span>`).join('')}</div>
    </div>`;

  // Score breakdown
  html += `
    <div class="score-breakdown">
      <div style="font-size:11px;font-weight:700;margin-bottom:4px;color:var(--text)">\u30B9\u30B3\u30A2\u5185\u8A33</div>
      <table>
        <tr><th>\u8247</th><th>\u9078\u624B</th><th>\u30B3\u30FC\u30B9</th><th>\u5B9F\u529B</th><th>\u5F53\u5730</th><th>\u30E2\u30FC\u30BF\u30FC</th><th>\u5C55\u793A</th><th>\u7D1A\u5225</th><th>\u5408\u8A08</th></tr>
        ${predicted.map(b => `
          <tr>
            <td style="font-weight:700">${b.bn}</td>
            <td>${b.name.replace(/\s/g,'').substring(0, 4)}</td>
            <td>${b.details.course}</td>
            <td>${b.details.skill}</td>
            <td>${b.details.local}</td>
            <td>${b.details.motor}</td>
            <td>${b.details.exhibition}</td>
            <td>${b.details.classBonus}</td>
            <td style="font-weight:700;color:var(--cyan)">${b.score}</td>
          </tr>
        `).join('')}
      </table>
    </div>`;

  // Show actual result
  if (raceResult) {
    const resBoats = raceResult.boats || [];
    const top3res = resBoats.filter(b => b.racer_place_number && b.racer_place_number <= 3)
      .sort((a, b) => a.racer_place_number - b.racer_place_number);
    if (top3res.length) {
      const actualOrder = top3res.map(b => b.racer_boat_number).join('-');
      const predictedOrder = `${predicted[0].bn}-${predicted[1].bn}-${predicted[2].bn}`;
      const hit = actualOrder === predictedOrder;
      html += `
        <div style="margin-top:10px;padding:10px;border-radius:10px;text-align:center;
          background:${hit ? 'rgba(0,200,83,0.12)' : 'rgba(255,82,82,0.08)'};
          border:1px solid ${hit ? 'var(--green)' : 'var(--red)'}33;font-size:13px">
          <div style="font-weight:700;color:${hit ? 'var(--green)' : 'var(--red)'};margin-bottom:2px">
            ${hit ? '\uD83C\uDF89 \u7684\u4E2D!' : '\u7D50\u679C\u78BA\u5B9A'}
          </div>
          <div>\u5B9F\u969B: <strong>${actualOrder}</strong></div>
        </div>`;
    }
  }

  html += '</div>';
  el.innerHTML = html;
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  loadAllData();
  setInterval(loadAllData, 300000);
});
</script>
</body>
</html>
