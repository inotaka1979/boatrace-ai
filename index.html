<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BoatRace Oracle">
<meta name="theme-color" content="#0A1628">
<title>BoatRace Oracle</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Orbitron:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0A1628;--card:#111D32;--border:#1E3A5F;--accent:#00B4D8;--text:#E0E8F0;--dim:#6B7B8D;--win:#00FF88;--lose:#FF4466;--gold:#FFD700}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:64px;-webkit-tap-highlight-color:transparent}
.header{background:linear-gradient(135deg,#0D1B2E,#162544);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-family:'Orbitron',sans-serif;font-weight:800;font-size:16px;color:var(--accent);letter-spacing:2px}
.header-sub{font-size:10px;color:var(--dim)}
.header-right{font-size:10px;color:var(--dim)}

/* ナビゲーション */
.nav{position:fixed;bottom:0;left:0;right:0;background:#0D1B2E;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:8px 0 6px;text-align:center;color:var(--dim);font-size:9px;cursor:pointer;border:none;background:none}
.nav-btn.active{color:var(--accent)}
.nav-btn .nav-icon{font-size:18px;display:block;margin-bottom:2px}

/* 画面切替 */
.page{display:none;padding:8px}
.page.active{display:block}

/* カード */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}

/* 場選択グリッド */
.stadium-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stadium-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:.2s}
.stadium-card:active{transform:scale(0.97)}
.stadium-name{font-weight:700;font-size:15px}
.stadium-grade{font-size:10px;padding:2px 6px;border-radius:8px;display:inline-block;margin-left:4px}
.grade-sg{background:#FF2244;color:#fff}
.grade-g1{background:#FF6644;color:#fff}
.grade-g2{background:#2288FF;color:#fff}
.grade-g3{background:#22CC44;color:#fff}
.grade-general{background:var(--border);color:var(--dim)}
.stadium-status{font-size:10px;color:var(--dim);margin-top:4px}

/* レース一覧 */
.race-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px}
.race-item:active{transform:scale(0.98)}
.race-num{font-family:'Orbitron';font-weight:700;font-size:18px;color:var(--accent);min-width:36px}
.race-info{flex:1}
.race-time{font-size:10px;color:var(--dim)}
.race-marks{font-size:13px;font-weight:700;letter-spacing:2px}
.race-result{font-size:11px;font-weight:700}
.hit{color:var(--win)}
.miss{color:var(--lose)}

/* 枠番バッジ */
.boat-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:12px;font-weight:700;flex-shrink:0}

/* 出走表 */
.boat-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;display:grid;grid-template-columns:26px 1fr;gap:8px;align-items:start}
.boat-details{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;font-size:11px}
.boat-name{font-weight:700;font-size:13px;grid-column:1/3}
.boat-stat{color:var(--dim)}
.boat-val{font-family:'Orbitron';font-size:11px}
.boat-score{font-family:'Orbitron';font-weight:700;font-size:16px}
.boat-mark{font-size:16px;font-weight:700}

/* AI予想 */
.prediction-box{background:linear-gradient(135deg,#0D1B2E,#162544);border:1px solid var(--accent);border-radius:12px;padding:14px;margin:10px 0}
.pred-title{font-size:12px;color:var(--accent);margin-bottom:8px;font-weight:700}
.pred-ranking{margin-bottom:10px}
.pred-rank-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
.bet-section{margin-top:10px}
.bet-label{font-size:10px;color:var(--dim);margin-bottom:4px}
.bet-combos{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.bet-chip{background:var(--border);padding:3px 8px;border-radius:6px;font-family:'Orbitron';font-size:11px}
.confidence{margin-top:8px;font-size:11px}
.confidence-stars{color:var(--gold)}
.reason-text{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.5}

/* 展示情報 */
.preview-section{margin:8px 0}
.preview-title{font-size:11px;color:var(--accent);margin-bottom:6px;font-weight:700}
.weather-bar{display:flex;gap:12px;font-size:11px;padding:8px;background:var(--card);border-radius:8px;border:1px solid var(--border);margin-bottom:8px}
.weather-item{display:flex;align-items:center;gap:4px}

/* 結果表示 */
.result-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin:8px 0}
.result-title{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px}
.result-places{display:flex;gap:8px;margin-bottom:8px;font-size:13px}
.refund-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.refund-label{color:var(--dim)}
.refund-val{font-family:'Orbitron';font-weight:700}

/* 成績ページ */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;text-align:center}
.stat-num{font-family:'Orbitron';font-size:32px;font-weight:800}
.stat-label{font-size:10px;color:var(--dim);margin-top:2px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;height:200px;position:relative}

/* 設定ページ */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--border)}
.setting-label{font-size:13px}
.setting-val{font-size:13px;color:var(--accent)}
select,button.action-btn{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px}
button.action-btn{cursor:pointer;margin-top:8px}
button.action-btn:active{background:var(--border)}

/* ローディング */
.loading{text-align:center;padding:40px;color:var(--dim)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin:8px 0;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .3s}

/* 戻るボタン */
.back-btn{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:8px;display:flex;align-items:center;gap:4px}

/* 免責 */
.footer-note{text-align:center;font-size:9px;color:var(--dim);padding:16px;margin-top:8px}

/* 展示タイム評価 */
.et-rank{font-weight:700;font-size:11px}
.et-best{color:var(--win)}
.et-good{color:var(--accent)}
.et-avg{color:var(--text)}
.et-bad{color:var(--lose)}
</style>
</head>
<body>

<div class="header">
  <div>
    <span class="logo">BOATRACE ORACLE</span>
    <div class="header-sub">AI予想エンジン v1.0</div>
  </div>
  <div class="header-right" id="headerDate"></div>
</div>

<!-- 画面① トップ -->
<div class="page active" id="pageTop">
  <div id="topLoading" class="loading"><div class="spinner"></div><div style="margin-top:8px">データ取得中...</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div id="stadiumList" class="stadium-grid" style="display:none"></div>
  <div class="footer-note">予想は統計モデルによる参考情報です。的中を保証するものではありません。</div>
</div>

<!-- 画面② レース一覧 -->
<div class="page" id="pageRaces">
  <button class="back-btn" onclick="showPage('top')">&larr; 場選択に戻る</button>
  <div style="font-weight:700;font-size:16px;margin-bottom:8px" id="racesTitle"></div>
  <div id="racesList"></div>
</div>

<!-- 画面③ レース詳細 -->
<div class="page" id="pageDetail">
  <button class="back-btn" id="detailBack">&larr; レース一覧に戻る</button>
  <div style="font-weight:700;font-size:16px;margin-bottom:8px" id="detailTitle"></div>
  <div id="detailWeather"></div>
  <div id="detailBoats"></div>
  <div id="detailPrediction"></div>
  <div id="detailResult"></div>
</div>

<!-- 画面④ 成績 -->
<div class="page" id="pageStats">
  <div style="font-weight:700;font-size:16px;margin-bottom:10px">成績トラッカー</div>
  <div class="stat-grid" id="statSummary"></div>
  <div class="chart-box"><canvas id="chartAccuracy"></canvas></div>
  <div id="statDetail"></div>
</div>

<!-- 画面⑤ 設定 -->
<div class="page" id="pageSettings">
  <div style="font-weight:700;font-size:16px;margin-bottom:10px">設定</div>
  <div class="card">
    <div class="setting-row">
      <span class="setting-label">買い目点数</span>
      <select id="setBetCount" onchange="saveSetting('betCount',this.value)">
        <option value="3">3点</option>
        <option value="5" selected>5点</option>
        <option value="10">10点</option>
      </select>
    </div>
    <div class="setting-row">
      <span class="setting-label">データキャッシュ</span>
      <button class="action-btn" onclick="clearCache()">クリア</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">成績履歴</span>
      <button class="action-btn" onclick="clearHistory()">リセット</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">選手DB</span>
      <button class="action-btn" onclick="rebuildDB()">再構築</button>
    </div>
  </div>
  <div class="footer-note">BoatRace Oracle v1.0<br>Boatrace Open API使用（非公式）<br>予想は参考情報であり、的中を保証するものではありません。</div>
</div>

<!-- ナビゲーション -->
<div class="nav">
  <button class="nav-btn active" onclick="showPage('top')" id="navTop"><span class="nav-icon">&#127968;</span>トップ</button>
  <button class="nav-btn" onclick="showPage('stats')" id="navStats"><span class="nav-icon">&#128202;</span>成績</button>
  <button class="nav-btn" onclick="showPage('settings')" id="navSettings"><span class="nav-icon">&#9881;</span>設定</button>
</div>

<script>
// ═══════════════════════════════════════════
// 定数
// ═══════════════════════════════════════════
var STADIUMS={1:"桐生",2:"戸田",3:"江戸川",4:"平和島",5:"多摩川",6:"浜名湖",7:"蒲郡",8:"常滑",9:"津",10:"三国",11:"びわこ",12:"住之江",13:"尼崎",14:"鳴門",15:"丸亀",16:"児島",17:"宮島",18:"徳山",19:"下関",20:"若松",21:"芦屋",22:"福岡",23:"唐津",24:"大村"};
var CLASS_NAME={1:"A1",2:"A2",3:"B1",4:"B2"};
var CLASS_COLOR={1:"#FF2244",2:"#FF6644",3:"#2288FF",4:"#888888"};
var BOAT_COLORS={1:"#FFFFFF",2:"#000000",3:"#FF1122",4:"#2255FF",5:"#FFD700",6:"#22CC44"};
var BOAT_TEXT={1:"#000000",2:"#FFFFFF",3:"#FFFFFF",4:"#FFFFFF",5:"#000000",6:"#FFFFFF"};
var COURSE_WIN_RATE={1:0.55,2:0.14,3:0.12,4:0.11,5:0.06,6:0.02};
var TECHNIQUE={1:"逃げ",2:"差し",3:"まくり",4:"まくり差し",5:"抜き",6:"恵まれ"};
var WIND_DIR={1:"N",2:"NNE",3:"NE",4:"ENE",5:"E",6:"ESE",7:"SE",8:"SSE",9:"S",10:"SSW",11:"SW",12:"WSW",13:"W",14:"WNW",15:"NW",16:"NNW",17:"無風"};
var GRADE_CLASS={1:{name:"SG",cls:"grade-sg"},2:{name:"G1",cls:"grade-g1"},3:{name:"G2",cls:"grade-g2"},4:{name:"G3",cls:"grade-g3"},5:{name:"一般",cls:"grade-general"}};
var API_BASE='https://boatraceopenapi.github.io';

// ═══════════════════════════════════════════
// 状態
// ═══════════════════════════════════════════
var programData=null,previewData=null,resultData=null;
var currentStadium=null,currentRace=null;
var settings=JSON.parse(localStorage.getItem('boatrace_settings')||'{"betCount":5}');
var statsChart=null;

// ═══════════════════════════════════════════
// ユーティリティ
// ═══════════════════════════════════════════
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

function cacheKey(url){
  var h=0;for(var i=0;i<url.length;i++){h=((h<<5)-h)+url.charCodeAt(i);h|=0;}
  return'bc_'+Math.abs(h);
}

function fetchWithFallback(url){
  return fetch(url,{signal:AbortSignal.timeout(10000)})
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json()})
    .then(function(d){try{localStorage.setItem(cacheKey(url),JSON.stringify({data:d,time:Date.now()}))}catch(e){}return d})
    .catch(function(e){
      console.warn('API error:',url,e.message);
      try{var c=localStorage.getItem(cacheKey(url));if(c){var o=JSON.parse(c);if(Date.now()-o.time<300000)return o.data}}catch(ex){}
      return null;
    });
}

function boatBadge(num){
  return '<span class="boat-badge" style="background:'+BOAT_COLORS[num]+';color:'+BOAT_TEXT[num]+';border:1px solid '+(num===1?'#ccc':'transparent')+'">'+num+'</span>';
}

function starsHtml(n){var s='';for(var i=0;i<5;i++)s+=i<n?'\u2605':'\u2606';return s;}

function todayStr(){var d=new Date();return d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2)}

function formatDate(){var d=new Date();return(d.getMonth()+1)+'/'+d.getDate()+' ('+['日','月','火','水','木','金','土'][d.getDay()]+')';}

// ═══════════════════════════════════════════
// 画面制御
// ═══════════════════════════════════════════
function showPage(page){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});

  if(page==='top'){document.getElementById('pageTop').classList.add('active');document.getElementById('navTop').classList.add('active')}
  else if(page==='races'){document.getElementById('pageRaces').classList.add('active');document.getElementById('navTop').classList.add('active')}
  else if(page==='detail'){document.getElementById('pageDetail').classList.add('active');document.getElementById('navTop').classList.add('active')}
  else if(page==='stats'){document.getElementById('pageStats').classList.add('active');document.getElementById('navStats').classList.add('active');renderStats()}
  else if(page==='settings'){document.getElementById('pageSettings').classList.add('active');document.getElementById('navSettings').classList.add('active');loadSettings()}
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════
// 予測エンジン
// ═══════════════════════════════════════════
function scoreBoat(boat,preview,weather){
  var score=0;
  var course=preview?preview.racer_course_number:boat.racer_boat_number;

  // コース補正
  var cs={1:30,2:12,3:8,4:5,5:3,6:2};
  score+=cs[course]||0;

  // 選手実力
  var winRate=parseFloat(boat.racer_national_top_1_percent)||0;
  score+=winRate*4;
  var localRate=parseFloat(boat.racer_local_top_2_percent)||0;
  score+=localRate*0.3;

  // 級別ボーナス
  var classBonus={1:10,2:5,3:0,4:-5};
  score+=classBonus[boat.racer_class_number]||0;

  // モーター
  var motorRate=parseFloat(boat.racer_assigned_motor_top_2_percent)||0;
  score+=motorRate*0.3;

  // ボート
  var boatRate=parseFloat(boat.racer_assigned_boat_top_2_percent)||0;
  score+=boatRate*0.1;

  // 展示タイム・ST
  if(preview){
    var st=parseFloat(preview.start_timing)||0;
    if(st>0&&st<=0.10)score+=3;
    if(st>0.20)score-=3;
    if(st<0)score-=5;
  }

  // 風補正
  if(weather){
    var ws=weather.wind_speed||0;
    var wd=weather.wind_direction||0;
    var isHead=(wd>=7&&wd<=11);
    var isTail=(wd>=15||wd<=3);
    if(isHead&&ws>=5){if(course<=2)score-=8;if(course>=4)score+=3}
    if(isTail&&ws>=3&&course===1)score+=3;
    if((weather.wave_height||0)>=5&&course<=2)score-=3;
  }

  // F持ちペナルティ
  if(boat.racer_flying_count_in_current_term>=2)score-=25;
  else if(boat.racer_flying_count_in_current_term>=1)score-=15;

  return{score:Math.max(0,score),course:course};
}

function addExhibitionBonus(scores,previews){
  if(!previews||!previews.boats)return scores;
  var times=[];
  for(var i=1;i<=6;i++){
    var pv=previews.boats[String(i)];
    times.push({boat:i,time:pv?parseFloat(pv.exhibition_time)||99:99});
  }
  times.sort(function(a,b){return a.time-b.time});
  var bonus=[8,5,3,0,-2,-4];
  times.forEach(function(t,idx){
    var s=scores.find(function(x){return x.boat===t.boat});
    if(s)s.score+=bonus[idx]||0;
    s.etRank=idx; // 展示タイム順位
  });
  return scores;
}

function generateBets(scores){
  var total=scores.reduce(function(a,s){return a+Math.exp(s.score/20)},0);
  var probs=scores.map(function(s){return{boat:s.boat,course:s.course,prob:Math.exp(s.score/20)/total,score:s.score,etRank:s.etRank}});
  probs.sort(function(a,b){return b.prob-a.prob});

  // 3連単
  var trifecta=[];
  for(var i=0;i<probs.length;i++){
    for(var j=0;j<probs.length;j++){
      if(j===i)continue;
      for(var k=0;k<probs.length;k++){
        if(k===i||k===j)continue;
        trifecta.push({combo:probs[i].boat+'-'+probs[j].boat+'-'+probs[k].boat,prob:probs[i].prob*probs[j].prob*probs[k].prob*6});
      }
    }
  }
  trifecta.sort(function(a,b){return b.prob-a.prob});

  // 2連単
  var exacta=[];
  for(var i=0;i<probs.length;i++){
    for(var j=0;j<probs.length;j++){
      if(j===i)continue;
      exacta.push({combo:probs[i].boat+'-'+probs[j].boat,prob:probs[i].prob*probs[j].prob*2});
    }
  }
  exacta.sort(function(a,b){return b.prob-a.prob});

  // マーク
  var marks=probs.map(function(p,i){
    return{boat:p.boat,mark:i===0?'\u25CE':i===1?'\u25CB':i===2?'\u25B2':i===3?'\u25B3':'\u00D7',prob:p.prob,score:p.score,etRank:p.etRank};
  });

  var conf=Math.round(probs[0].prob*100);
  var confStars=conf>=40?5:conf>=30?4:conf>=22?3:conf>=15?2:1;

  return{marks:marks,trifecta:trifecta.slice(0,parseInt(settings.betCount)||5),exacta:exacta.slice(0,parseInt(settings.betCount)||5),confidence:conf,confStars:confStars};
}

function generateReason(marks,previews,weather){
  var top=marks[0];
  var reasons=[];
  if(top.boat===1||((previews&&previews.boats&&previews.boats[String(top.boat)]||{}).racer_course_number===1))
    reasons.push(top.boat+'号艇が1コースからの逃げ有力');
  else
    reasons.push(top.boat+'号艇のスコアが最高('+Math.round(top.score)+'点)');

  if(top.etRank===0)reasons.push('展示タイム最速');
  else if(top.etRank===1)reasons.push('展示タイム2番手');

  if(weather){
    var ws=weather.wind_speed||0;
    if(ws>=5)reasons.push('風速'+ws+'mで荒れ模様');
    else if(ws<=2)reasons.push('風弱く安定条件');
  }
  return reasons.join('。')+'。';
}

function predictRace(stadiumId,raceNum){
  if(!programData)return null;
  var stadiumProg=programData[String(stadiumId)];
  if(!stadiumProg)return null;
  var race=stadiumProg[String(raceNum)];
  if(!race||!race.boats)return null;

  var preview=null,weather=null;
  if(previewData&&previewData[String(stadiumId)]&&previewData[String(stadiumId)][String(raceNum)]){
    preview=previewData[String(stadiumId)][String(raceNum)];
    weather=preview.weather||null;
  }

  var boats=race.boats;
  var scores=[];
  // programsのboatsは配列
  if(Array.isArray(boats)){
    boats.forEach(function(b){
      var pv=preview&&preview.boats?preview.boats[String(b.racer_boat_number)]:null;
      var s=scoreBoat(b,pv,weather);
      scores.push({boat:b.racer_boat_number,score:s.score,course:s.course,etRank:5});
    });
  }

  scores=addExhibitionBonus(scores,preview);
  var bets=generateBets(scores);
  bets.reason=generateReason(bets.marks,preview,weather);
  bets.weather=weather;
  return bets;
}

// ═══════════════════════════════════════════
// 成績管理
// ═══════════════════════════════════════════
function savePrediction(date,stadium,race,prediction,result){
  try{
    var key='boatrace_history';
    var history=JSON.parse(localStorage.getItem(key)||'[]');
    // 重複防止
    var exists=history.some(function(h){return h.date===date&&h.stadium===stadium&&h.race===race});
    if(exists)return;
    var entry={date:date,stadium:stadium,race:race,predicted:prediction.marks.map(function(m){return m.boat}),trifecta_bets:prediction.trifecta.map(function(t){return t.combo}),actual:null,trifecta_hit:false,exacta_hit:false};
    if(result&&result.results){
      entry.actual=result.results.sort(function(a,b){return a.place-b.place}).map(function(r){return r.racer_boat_number});
      checkHit(entry,result);
    }
    history.push(entry);
    if(history.length>1000)history.splice(0,history.length-1000);
    localStorage.setItem(key,JSON.stringify(history));
  }catch(e){console.warn('savePrediction error:',e)}
}

function checkHit(entry,result){
  if(!entry.actual||entry.actual.length<3)return;
  var actualCombo=entry.actual[0]+'-'+entry.actual[1]+'-'+entry.actual[2];
  entry.trifecta_hit=entry.trifecta_bets&&entry.trifecta_bets.indexOf(actualCombo)>=0;
  var actualExacta=entry.actual[0]+'-'+entry.actual[1];
  var predExacta=entry.predicted[0]+'-'+entry.predicted[1];
  entry.exacta_hit=(actualExacta===predExacta);
}

function updateHistoryWithResults(){
  try{
    var history=JSON.parse(localStorage.getItem('boatrace_history')||'[]');
    var updated=false;
    history.forEach(function(h){
      if(h.actual)return;
      if(resultData&&resultData[String(h.stadium)]&&resultData[String(h.stadium)][String(h.race)]){
        var res=resultData[String(h.stadium)][String(h.race)];
        if(res.results&&res.results.length>0){
          h.actual=res.results.sort(function(a,b){return a.place-b.place}).map(function(r){return r.racer_boat_number});
          checkHit(h,res);
          updated=true;
        }
      }
    });
    if(updated)localStorage.setItem('boatrace_history',JSON.stringify(history));
  }catch(e){}
}

function getAccuracy(){
  var history=JSON.parse(localStorage.getItem('boatrace_history')||'[]');
  var verified=history.filter(function(h){return h.actual&&h.actual.length>0});
  if(!verified.length)return{trifectaRate:0,exactaRate:0,total:0,trifectaHit:0,exactaHit:0};
  var th=verified.filter(function(h){return h.trifecta_hit}).length;
  var eh=verified.filter(function(h){return h.exacta_hit}).length;
  return{trifectaRate:(th/verified.length*100).toFixed(1),exactaRate:(eh/verified.length*100).toFixed(1),total:verified.length,trifectaHit:th,exactaHit:eh};
}

// ═══════════════════════════════════════════
// DB構築
// ═══════════════════════════════════════════
async function buildInitialDB(){
  var db=JSON.parse(localStorage.getItem('boatrace_racerDB')||'{}');
  if(Object.keys(db).length>100)return;
  var prog=document.getElementById('progressFill');
  for(var d=1;d<=7;d++){
    var date=new Date(Date.now()-d*86400000);
    var yyyymmdd=date.getFullYear()+('0'+(date.getMonth()+1)).slice(-2)+('0'+date.getDate()).slice(-2);
    var yyyy=yyyymmdd.slice(0,4);
    prog.style.width=(d/7*50)+'%';
    var data=await fetchWithFallback(API_BASE+'/results/v2/'+yyyy+'/'+yyyymmdd+'.json');
    if(data){
      for(var sid in data){
        var races=data[sid];
        for(var rn in races){
          var race=races[rn];
          if(race&&race.results){
            race.results.forEach(function(r){
              if(!db[r.racer_registration_number])db[r.racer_registration_number]={results:[]};
              db[r.racer_registration_number].results.push({place:r.place,stadium:sid,date:yyyymmdd});
            });
          }
        }
      }
    }
    await sleep(1000);
  }
  localStorage.setItem('boatrace_racerDB',JSON.stringify(db));
}

async function loadAllData(){
  var prog=document.getElementById('progressFill');

  await buildInitialDB();

  programData=await fetchWithFallback(API_BASE+'/programs/v2/today.json');

  previewData=await fetchWithFallback(API_BASE+'/previews/v2/today.json');
  prog.style.width='80%';

  resultData=await fetchWithFallback(API_BASE+'/results/v2/today.json');
  prog.style.width='100%';

  updateHistoryWithResults();
  renderStadiums();
}

function renderStadiums(){
  document.getElementById('topLoading').style.display='none';
  var list=document.getElementById('stadiumList');
  list.style.display='grid';
  list.innerHTML='';

  if(!programData){list.innerHTML='<div class="card" style="grid-column:1/3;text-align:center">本日のレースデータがありません</div>';return}

  var ids=Object.keys(programData).sort(function(a,b){return parseInt(a)-parseInt(b)});
  ids.forEach(function(sid){
    var stadium=programData[sid];
    var name=STADIUMS[parseInt(sid)]||('場'+sid);
    var raceNums=Object.keys(stadium).sort(function(a,b){return parseInt(a)-parseInt(b)});
    var totalRaces=raceNums.length;

    // 結果が出ているレース数
    var doneCount=0;
    if(resultData&&resultData[sid]){
      raceNums.forEach(function(rn){
        if(resultData[sid][rn]&&resultData[sid][rn].results)doneCount++;
      });
    }

    // グレード
    var firstRace=stadium[raceNums[0]];
    var gradeNum=firstRace?firstRace.race_grade_number||5:5;
    var grade=GRADE_CLASS[gradeNum]||GRADE_CLASS[5];

    var div=document.createElement('div');
    div.className='stadium-card';
    div.innerHTML='<div><span class="stadium-name">'+name+'</span><span class="stadium-grade '+grade.cls+'">'+grade.name+'</span></div>'
      +'<div class="stadium-status">'+totalRaces+'R開催 / '+doneCount+'R確定</div>';
    div.onclick=function(){openStadium(sid)};
    list.appendChild(div);
  });
}

// 画面②: レース一覧

function openStadium(sid){
  currentStadium=sid;
  var name=STADIUMS[parseInt(sid)]||('場'+sid);
  document.getElementById('racesTitle').textContent=name+' \u2014 レース一覧';
  var list=document.getElementById('racesList');
  list.innerHTML='';

  var stadium=programData[sid];
  if(!stadium){list.innerHTML='<div class="card">データがありません</div>';showPage('races');return}

  var raceNums=Object.keys(stadium).sort(function(a,b){return parseInt(a)-parseInt(b)});
  raceNums.forEach(function(rn){
    var race=stadium[rn];
    var pred=predictRace(sid,parseInt(rn));
    var hasResult=resultData&&resultData[sid]&&resultData[sid][rn]&&resultData[sid][rn].results;
    var startTime=race.race_deadline_time||'';

    // 予想結果を保存
    if(pred){
      savePrediction(todayStr(),sid,rn,pred,hasResult?resultData[sid][rn]:null);
    }

    var marksStr=pred?pred.marks.slice(0,4).map(function(m){return boatBadge(m.boat)}).join(' '):'---';

    var resultStr='';
    if(hasResult){
      var res=resultData[sid][rn];
      var places=res.results.sort(function(a,b){return a.place-b.place}).slice(0,3);
      var actualCombo=places[0].racer_boat_number+'-'+places[1].racer_boat_number+'-'+places[2].racer_boat_number;
      resultStr='<div class="race-result">'+places.map(function(p){return boatBadge(p.racer_boat_number)}).join('')+'</div>';
      // 的中チェック
      if(pred){
        var hit=pred.trifecta.some(function(t){return t.combo===actualCombo});
        resultStr+='<div class="race-result '+(hit?'hit':'miss')+'">'+(hit?'\u2705 的中':'\u274C')+'</div>';
      }
    }

    var div=document.createElement('div');
    div.className='race-item';
    div.innerHTML='<div class="race-num">'+rn+'R</div>'
      +'<div class="race-info">'
      +'<div class="race-time">'+startTime+'</div>'
      +'<div class="race-marks">'+marksStr+'</div>'
      +resultStr
      +'</div>';
    div.onclick=function(){openRace(sid,rn)};
    list.appendChild(div);
  });

  showPage('races');
}

// 画面③: レース詳細
// ═══════════════════════════════════════════
function openRace(sid,rn){
  currentRace=rn;
  var name=STADIUMS[parseInt(sid)]||('場'+sid);
  document.getElementById('detailTitle').textContent=name+' '+rn+'R';
  document.getElementById('detailBack').onclick=function(){openStadium(sid)};

  var race=programData[sid][rn];
  var preview=previewData&&previewData[sid]&&previewData[sid][rn]?previewData[sid][rn]:null;
  var result=resultData&&resultData[sid]&&resultData[sid][rn]?resultData[sid][rn]:null;
  var pred=predictRace(sid,parseInt(rn));

  // 天候
  var weatherHtml='';
  if(preview&&preview.weather){
    var w=preview.weather;
    var windDir=WIND_DIR[w.wind_direction]||'---';
    weatherHtml='<div class="weather-bar">'
      +'<span class="weather-item">\uD83C\uDF2C '+windDir+' '+((w.wind_speed||0))+'m</span>'
      +'<span class="weather-item">\uD83C\uDF0A 波高'+(w.wave_height||0)+'cm</span>'
      +'</div>';
  }
  document.getElementById('detailWeather').innerHTML=weatherHtml;

  // 出走表
  var boatsHtml='';
  if(race&&race.boats&&Array.isArray(race.boats)){
    // 展示タイムのランキング作成
    var etTimes=[];
    if(preview&&preview.boats){
      for(var bi=1;bi<=6;bi++){
        var pv=preview.boats[String(bi)];
        etTimes.push({boat:bi,time:pv?parseFloat(pv.exhibition_time)||99:99});
      }
      etTimes.sort(function(a,b){return a.time-b.time});
    }

    race.boats.forEach(function(b){
      var bn=b.racer_boat_number;
      var pv=preview&&preview.boats?preview.boats[String(bn)]:null;
      var mark=pred?pred.marks.find(function(m){return m.boat===bn}):null;

      // 展示タイム評価
      var etLabel='',etClass='';
      if(pv&&etTimes.length>0){
        var rank=etTimes.findIndex(function(t){return t.boat===bn});
        if(rank===0){etLabel='\u25CE';etClass='et-best'}
        else if(rank===1){etLabel='\u25CB';etClass='et-good'}
        else if(rank<=3){etLabel='\u25B3';etClass='et-avg'}
        else{etLabel='\u00D7';etClass='et-bad'}
      }

      boatsHtml+='<div class="boat-row">'
        +'<div>'+boatBadge(bn)+'</div>'
        +'<div class="boat-details">'
        +'<div class="boat-name">'+escText(b.racer_name||'')+' <span style="color:'+CLASS_COLOR[b.racer_class_number]+'">'+CLASS_NAME[b.racer_class_number]+'</span>'
        +(mark?' <span class="boat-mark" style="color:var(--accent)">'+mark.mark+'</span>':'')
        +(mark?' <span class="boat-score" style="color:var(--gold)">'+Math.round(mark.score)+'</span>':'')
        +'</div>'
        +'<div><span class="boat-stat">全国勝率</span> <span class="boat-val">'+(b.racer_national_top_1_percent||'---')+'</span></div>'
        +'<div><span class="boat-stat">当地2連</span> <span class="boat-val">'+(b.racer_local_top_2_percent||'---')+'%</span></div>'
        +'<div><span class="boat-stat">モーター</span> <span class="boat-val">'+(b.racer_assigned_motor_top_2_percent||'---')+'%</span></div>'
        +'<div><span class="boat-stat">ボート</span> <span class="boat-val">'+(b.racer_assigned_boat_top_2_percent||'---')+'%</span></div>'
        +(pv?'<div><span class="boat-stat">展示T</span> <span class="boat-val">'+(pv.exhibition_time||'---')+' <span class="et-rank '+etClass+'">'+etLabel+'</span></span></div>':'')
        +(pv?'<div><span class="boat-stat">ST</span> <span class="boat-val">'+(pv.start_timing||'---')+'</span></div>':'')
        +(pv?'<div><span class="boat-stat">コース</span> <span class="boat-val">'+(pv.racer_course_number||bn)+'</span></div>':'')
        +'<div><span class="boat-stat">F数</span> <span class="boat-val">'+(b.racer_flying_count_in_current_term||0)+'</span></div>'
        +'<div><span class="boat-stat">体重</span> <span class="boat-val">'+(b.racer_weight||'---')+'kg</span></div>'
        +'</div></div>';
    });
  }
  document.getElementById('detailBoats').innerHTML=boatsHtml;

  // AI予想
  var predHtml='';
  if(pred){
    predHtml='<div class="prediction-box">'
      +'<div class="pred-title">\uD83D\uDD2E AI予想</div>'
      +'<div class="pred-ranking">';
    pred.marks.forEach(function(m,i){
      if(i>=4)return;
      predHtml+='<div class="pred-rank-item">'+boatBadge(m.boat)+' <span class="boat-mark">'+m.mark+'</span> <span class="boat-score" style="color:var(--gold)">'+Math.round(m.score)+'点</span> <span style="font-size:10px;color:var(--dim)">('+Math.round(m.prob*100)+'%)</span></div>';
    });
    predHtml+='</div>';

    predHtml+='<div class="bet-section">'
      +'<div class="bet-label">3連単 推奨</div><div class="bet-combos">';
    pred.trifecta.forEach(function(t){predHtml+='<span class="bet-chip">'+t.combo+'</span>'});
    predHtml+='</div>';

    predHtml+='<div class="bet-label">2連単 推奨</div><div class="bet-combos">';
    pred.exacta.forEach(function(t){predHtml+='<span class="bet-chip">'+t.combo+'</span>'});
    predHtml+='</div></div>';

    predHtml+='<div class="confidence">信頼度: <span class="confidence-stars">'+starsHtml(pred.confStars)+'</span></div>';
    predHtml+='<div class="reason-text">'+escText(pred.reason)+'</div>';
    predHtml+='</div>';
  }
  document.getElementById('detailPrediction').innerHTML=predHtml;

  // 結果
  var resHtml='';
  if(result&&result.results&&result.results.length>0){
    var places=result.results.sort(function(a,b){return a.place-b.place});
    resHtml='<div class="result-box"><div class="result-title">\uD83C\uDFC6 レース結果</div>';
    resHtml+='<div class="result-places">';
    places.slice(0,3).forEach(function(p){
      resHtml+='<span>'+p.place+'着 '+boatBadge(p.racer_boat_number)+'</span>';
    });
    resHtml+='</div>';

    if(result.technique_number){
      resHtml+='<div style="font-size:11px;margin-bottom:6px">決まり手: <b>'+(TECHNIQUE[result.technique_number]||'---')+'</b></div>';
    }

    if(result.refund){
      if(result.refund.trifecta){
        result.refund.trifecta.forEach(function(r){
          resHtml+='<div class="refund-row"><span class="refund-label">3連単 '+r.combination+'</span><span class="refund-val">\u00a5'+r.amount.toLocaleString()+'</span></div>';
        });
      }
      if(result.refund.trio){
        result.refund.trio.forEach(function(r){
          resHtml+='<div class="refund-row"><span class="refund-label">3連複 '+r.combination+'</span><span class="refund-val">\u00a5'+r.amount.toLocaleString()+'</span></div>';
        });
      }
      if(result.refund.exacta){
        result.refund.exacta.forEach(function(r){
          resHtml+='<div class="refund-row"><span class="refund-label">2連単 '+r.combination+'</span><span class="refund-val">\u00a5'+r.amount.toLocaleString()+'</span></div>';
        });
      }
    }

    // 的中判定
    if(pred){
      var actualCombo=places[0].racer_boat_number+'-'+places[1].racer_boat_number+'-'+places[2].racer_boat_number;
      var hit=pred.trifecta.some(function(t){return t.combo===actualCombo});
      resHtml+='<div style="margin-top:8px;font-size:14px;font-weight:700;text-align:center" class="'+(hit?'hit':'miss')+'">'+(hit?'\u2705 3連単 的中!':'\u274C 不的中')+'</div>';
    }

    resHtml+='</div>';
  }
  document.getElementById('detailResult').innerHTML=resHtml;

  showPage('detail');
}

    '<div class="stat-card"><div class="stat-num" style="color:var(--accent)">'+acc.total+'</div><div class="stat-label">判定済</div></div>'

    +'<div class="stat-card"><div class="stat-num" style="color:var(--win)">'+acc.trifectaRate+'%</div><div class="stat-label">3連単率</div></div>';

  document.getElementById('statDetail').innerHTML=
    '<div class="card"><div class="setting-row"><span class="setting-label">2連単的中数</span><span class="setting-val">'+acc.exactaHit+'</span></div>'

  // グラフ
  renderStatsChart();
}

function renderStatsChart(){
  var ctx=document.getElementById('chartAccuracy');
  if(statsChart)statsChart.destroy();

  var history=JSON.parse(localStorage.getItem('boatrace_history')||'[]');
  var byDate={};
  history.forEach(function(h){
    if(!h.actual)return;
    if(!byDate[h.date])byDate[h.date]={total:0,hit:0};
    byDate[h.date].total++;
    if(h.trifecta_hit)byDate[h.date].hit++;
  });

  var dates=Object.keys(byDate).sort().slice(-14);
  var rates=dates.map(function(d){return byDate[d].total>0?(byDate[d].hit/byDate[d].total*100):0});

  statsChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:dates.map(function(d){return d.slice(4,6)+'/'+d.slice(6)}),
      datasets:[{data:rates,backgroundColor:'rgba(0,180,216,0.6)',borderColor:'#00B4D8',borderWidth:1,borderRadius:4}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:0},
      plugins:{legend:{display:false},title:{display:true,text:'日別3連単的中率(%)',color:'#6B7B8D',font:{size:11}}},
      scales:{
        x:{ticks:{font:{size:9},color:'#6B7B8D'},grid:{display:false}},
        y:{beginAtZero:true,max:100,ticks:{font:{size:9},color:'#6B7B8D',callback:function(v){return v+'%'}},grid:{color:'rgba(30,58,95,0.3)'}}
      }
    }
  });
}
