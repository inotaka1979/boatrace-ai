# Render 静的サイト設定
# ビルド不要、ルートを静的に配信
services:
  - type: web
    name: boatrace-ai
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /data/*
        name: Cache-Control
        value: max-age=60
    routes:
      - type: rewrite
        source: /
        destination: /index.html
