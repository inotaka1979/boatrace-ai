name: Probe Venue (diag)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/probe-venue.yml','scripts/probe_venue.py']
permissions:
  contents: read
concurrency:
  group: probe-venue
  cancel-in-progress: false
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/probe_venue.py
      - name: Commit samples
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: |
          set -euo pipefail
          git config user.name "Automated"; git config user.email "actions@users.noreply.github.com"
          git add data/_debug/
          if git diff --staged --quiet; then echo "no samples"; exit 0; fi
          git commit -m "probe: venue samples $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          for i in 1 2 3 4 5; do
            git fetch "$REMOTE" main
            if git rebase FETCH_HEAD; then git push "$REMOTE" HEAD:main && exit 0; else git rebase --abort||true; fi
            sleep $((RANDOM%5+i))
          done
          echo "::error::push failed"; exit 1
