name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# PA-4: テストは読み取り専用
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - name: Run all tests
        run: bash scripts/tests/run_all.sh
      # Path B (2026-05-16): code-split 静的アナライザを CI ゲート化。
      # critical bundle が rest bundle の関数を typeof guard 無しに呼ぶと
      # PJ Phase の iOS PWA silent halt が再発する。build --check で違反を CI で必ず検出。
      - name: Install build deps
        run: cd build && npm install --no-audit --no-fund
      - name: Code-split dependency lint (PJ Phase regression guard)
        run: cd build && node build.mjs --check

  # P1-Q5: Python 型チェックゲート（PC-4 で型ヒント追加済み、CI で検証する）
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install mypy
        run: pip install mypy types-requests
      - name: Type check
        run: mypy scripts/ --ignore-missing-imports --no-error-summary || echo "mypy advisory (non-blocking)"

  # P1-Q4: axe-core ゲート（a11y 退行を CI で検知）
  a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - name: Install axe + http-server
        run: npm install -g @axe-core/cli http-server
      - name: Start static server
        run: http-server . -p 8080 -s &
      - name: Wait for server
        run: sleep 3
      - name: Run axe
        run: axe http://localhost:8080/ --exit --tags wcag2a,wcag2aa || echo "axe advisory (non-blocking until baseline established)"
