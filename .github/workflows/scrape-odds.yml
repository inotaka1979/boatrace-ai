name: Scrape Odds
# Pi primary (3 分粒度の cron_scrape.sh) + GHA backup (15 分粒度) の二重化。
# Pi 停止時にもオッズが完全停止しないようバックアップで定期更新。
# 競合: 両者の commit & push は git pull --rebase + retry で吸収。
on:
  workflow_dispatch:
  # PA-4: repository_dispatch は撤去（外部トリガ経路を縮小、必要時は workflow_dispatch で代替）
  schedule:
    # JST 08:00–22:00 を 15 分間隔でカバー（previews と push 競合を避けるため :00/15/30/45 に分散）
    - cron: '0,15,30,45 23,0-13 * * *'

# PA-4: 既定権限を最小化
permissions:
  contents: read

concurrency:
  group: scrape-odds
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_odds_fast.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          git diff --staged --quiet && exit 0
          git commit -m "odds: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push "$REMOTE" HEAD:main || (git pull --rebase origin main && git push "$REMOTE" HEAD:main)
