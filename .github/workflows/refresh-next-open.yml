name: Refresh Next Open (daily quick)

# scrape-racedata.yml が 30 分 timeout で慢性的に失敗するため、
# next_open.json の日次更新だけを軽量 workflow として分離。
# current.json (月次フル fetch 結果) を再利用するため HTTP fetch ゼロ、
# 数秒で完了する。
on:
  schedule:
    - cron: '15 0 * * *'   # JST 09:15（毎日朝、レース開始前）
    - cron: '15 12 * * *'  # JST 21:15（夜、翌日反映）
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-next-open
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Refresh next_open.json
        run: python scripts/scrape_schedule.py --quick
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/schedule/next_open.json
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "next_open: refresh ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          for i in 1 2 3; do
            if git push "$REMOTE" HEAD:main; then
              echo "push ok (attempt $i)"
              exit 0
            fi
            echo "push rejected (attempt $i) — pulling and retrying..."
            git pull --rebase "$REMOTE" main || exit 1
          done
          exit 1
