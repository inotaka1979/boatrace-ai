name: Refresh Next Open + Prerender (frequent)

# scrape-racedata.yml が 30 分 timeout で慢性的に失敗していた歴史から、
# next_open.json の日次更新 + index.html prerender だけを軽量 workflow として分離。
# OpenAPI programs と current.json (月次フル fetch 結果) を使用、数秒で完了。
#
# 2026-05-16: index.html prerender を同梱。scrape-racedata が timeout で固まると
#   index.html の <!-- PRERENDER:STADIUMS --> が 9 日間古いまま残り、
#   「場が昨日のまま」のユーザ視認障害になっていた問題への対処。
#   日替わり境界・場切替頻度を考慮して JST 5 時刻に増やす。
on:
  schedule:
    # 2026-06-04 (rt-fix P2-7): scrape-all の :00/:30 push と衝突しないよう
    #   :00 発火を :20 にずらす（同時刻 push race を回避）。
    - cron: '15 0 * * *'    # JST 09:15（朝、レース開始前）
    - cron: '20 1 * * *'    # JST 10:20（場切替後）
    - cron: '20 4 * * *'    # JST 13:20（昼）
    - cron: '20 8 * * *'    # JST 17:20（夕方）
    - cron: '15 12 * * *'   # JST 21:15（夜、翌日反映）
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-next-open
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Refresh schedule (current.json) + next_open.json
        # rt-fix3 (2026-06-27): --quick (next_open のみ再計算) → フル取得モードに変更。
        #   current.json が _is_current_fresh (2 日) を超えていればフルスケジュールを再取得し、
        #   以内なら next_open のみ再計算 (HTTP なし)。従来 current.json のフル取得は
        #   scrape-racedata.yml の月1回のみで、最大 14 日古いスケジュールから next_open を算出して
        #   「非開催なのに本日開催」と誤表示する主因になっていた。本 workflow は 1 日 5 回走るため
        #   日次で current.json が最新化される。
        run: python scripts/scrape_schedule.py
      # Path B (2026-05-16): prerender_top.py を撤去。
      # index.html は skeleton CSS で常時表示、JS render が今日のデータで上書き。
      # → 「場が昨日のまま」の根本原因 (prerender 古さ) を構造的に解消。
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 2026-06-04 (rt-fix P0-3): commit-first + rebase --abort で衝突時の commit 喪失を防止。
          git config rebase.autoStash true
          # rt-fix3: current.json (フルスケジュール) も commit 対象に追加（本 workflow が単独所有）。
          git add data/schedule/next_open.json data/schedule/current.json
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "next_open: refresh ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          for i in 1 2 3 4 5; do
            git fetch "$REMOTE" main
            if git rebase FETCH_HEAD; then
              if git push "$REMOTE" HEAD:main; then
                echo "push ok (attempt $i)"
                exit 0
              fi
              echo "push rejected (attempt $i) — refetch & retry"
            else
              echo "rebase conflict (attempt $i) — abort & retry"
              git rebase --abort || true
            fi
            sleep $((RANDOM % 5 + i))
          done
          echo "::error::push failed after 5 attempts"
          exit 1
