name: Probe Original Exhibition (PoC)

# 各場「オリジナル展示」ページの HTML をキャプチャして data/_debug/ に保存する PoC。
# パーサ設計のためのサンプル採取専用（Phase 1 の _debug_racelist.html と同じ進め方）。
# push(マージ)で1回 + 任意の手動実行。構造確認が済んだら撤去する。

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/probe-exhibition.yml'
      - 'scripts/probe_original_exhibition.py'

permissions:
  contents: read

concurrency:
  group: probe-exhibition
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Capture sample HTML
        run: python scripts/probe_original_exhibition.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add data/_debug/
          if git diff --staged --quiet; then
            echo "::notice::no sample captured"; exit 0
          fi
          git commit -m "probe: original exhibition sample HTML $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          for i in 1 2 3 4 5; do
            git fetch "$REMOTE" main
            if git rebase FETCH_HEAD; then
              if git push "$REMOTE" HEAD:main; then echo "push ok"; exit 0; fi
            else
              git rebase --abort || true
            fi
            sleep $((RANDOM % 5 + i))
          done
          echo "::error::push failed"; exit 1
