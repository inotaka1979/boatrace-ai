name: Scrape Tide
# 2026-05-07: Pi 撤去で新設。1 日 1 回 JST 08:00 に潮汐データを取得。
# JMA (気象庁) の海水場潮汐情報を 7 場分まとめて data/tide/today.json に書き出す。
on:
  # 2026-05-16 Path B: scrape-all.yml に統合、本ワークフローは緊急時の手動 dispatch のみ
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: scrape-tide
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_tide.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          # REDESIGN.md Phase 1: silent success 撲滅
          if git diff --staged --quiet; then
            echo "::notice::no data changes to commit"
          else
            git commit -m "tide: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git push "$REMOTE" HEAD:main || (git pull --rebase origin main && git push "$REMOTE" HEAD:main)
          fi
