name: Lighthouse CI

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'sw.js'
      - 'manifest.json'
      - '.lighthouserc.json'
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'sw.js'
      - 'manifest.json'
      - '.lighthouserc.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x
      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
