name: Scrape Results
# 2026-05-07: Cloudflare Worker (boatrace-scrape-trigger) が primary。
# こちらの cron は Cloudflare 障害時の安全網（30 分間隔）。
# 2026-05-16: 全 run が 30 分 timeout で cancel される問題対処
#   scrape_results.py 側で並列 4 + 全体予算 1200s + 部分書込を実装、
#   workflow timeout を 25 分に下げて scrape 内予算と整合。
on:
  # 2026-05-16 Path B: scrape-all.yml に統合、本ワークフローは緊急時の手動 dispatch のみ
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: scrape-results
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_results.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          # REDESIGN.md Phase 1: silent success 撲滅
          if git diff --staged --quiet; then
            echo "::notice::no data changes to commit (freshness check will validate)"
          else
            git commit -m "results: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git push "$REMOTE" HEAD:main || (git pull --rebase origin main && git push "$REMOTE" HEAD:main)
          fi
      # REDESIGN.md Phase 1: scrape 直後の鮮度検証 (strict)
      - name: Verify data freshness
        if: always()
        run: |
          python3 scripts/check_freshness.py \
            data/results/today.json \
            --max-age-min 360 \
            --strict
