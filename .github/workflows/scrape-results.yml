name: Scrape Results
# 2026-05-07: Cloudflare Worker (boatrace-scrape-trigger) が primary。
# こちらの cron は Cloudflare 障害時の安全網（30 分間隔）。
on:
  workflow_dispatch:
  schedule:
    # JST 10:10–22:40 を 30 分間隔（:10/40、他と offset で push 衝突回避）
    - cron: '10,40 1-13 * * *'

# PA-4: 既定権限を最小化
permissions:
  contents: read

concurrency:
  group: scrape-results
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_results.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          git diff --staged --quiet && exit 0
          git commit -m "results: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push "$REMOTE" HEAD:main || (git pull --rebase origin main && git push "$REMOTE" HEAD:main)
