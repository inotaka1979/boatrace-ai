name: Scrape Results
# 2026-05-07: Pi 撤去で cron を復活。5 分間隔（odds/previews と offset +2）。
# data/results/today.json を boatraceopenapi.github.io から取得し更新する。
# scrape_previews.py の smart scheduler も results を統合するが、こちらが
# 全レース分を網羅的に書き出す primary。
on:
  workflow_dispatch:
  schedule:
    # JST 10:00–22:00 を 5 分間隔でカバー（UTC 1–13、odds:00 / previews:01 と offset +2）
    - cron: '2-59/5 1-13 * * *'

# PA-4: 既定権限を最小化
permissions:
  contents: read

concurrency:
  group: scrape-results
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_results.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          git diff --staged --quiet && exit 0
          git commit -m "results: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push "$REMOTE" HEAD:main || (git pull --rebase origin main && git push "$REMOTE" HEAD:main)
