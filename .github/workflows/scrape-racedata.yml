name: Scrape Race Data
on:
  schedule:
    - cron: '30 0 * * *'   # JST 09:30（レース開始前）
    - cron: '0 3 * * *'    # JST 12:00（昼更新）
    - cron: '0 0 1 * *'    # 毎月1日（スケジュール取得）
  workflow_dispatch:

# PA-4: 既定権限を最小化
permissions:
  contents: read

concurrency:
  group: scrape-racedata
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_racedata.py
      - name: Scrape schedule (monthly)
        if: github.event.schedule == '0 0 1 * *' || github.event_name == 'workflow_dispatch'
        run: python scripts/scrape_schedule.py
      - name: PE-11 Pre-render top page (LCP 即時化)
        run: python scripts/prerender_top.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/ index.html
          git diff --staged --quiet && exit 0
          git commit -m "racedata + prerender: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push "$REMOTE" HEAD:main || (git pull --rebase origin main && git push "$REMOTE" HEAD:main)
