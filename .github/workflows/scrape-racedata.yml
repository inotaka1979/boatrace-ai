name: Scrape Race Data
on:
  schedule:
    - cron: '30 0 * * *'   # JST 09:30（レース開始前）
    - cron: '0 3 * * *'    # JST 12:00（昼更新）
    - cron: '0 0 1 * *'    # 毎月1日（スケジュール取得）
  workflow_dispatch:
concurrency:
  group: scrape-racedata
  cancel-in-progress: true
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_racedata.py
      - name: Scrape schedule (monthly)
        if: github.event.schedule == '0 0 1 * *' || github.event_name == 'workflow_dispatch'
        run: python scripts/scrape_schedule.py
      - name: Commit
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          git diff --staged --quiet || git commit -m "racedata: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || (git pull --rebase origin main && git push)
