name: Probe Venue Format (diag)

# 診断専用: ajax_yosou 非対応各場のサイト形式を分類してログ出力する。形式別パーサ設計用。
# サンプル HTML を data/_debug に保存。確認後に撤去。

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/probe-venue-format.yml'
      - 'scripts/probe_venue_format.py'

permissions:
  contents: read

concurrency:
  group: probe-venue-format
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Classify venue formats
        run: python scripts/probe_venue_format.py
      - name: Commit samples
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add data/_debug/
          if git diff --staged --quiet; then echo "::notice::no samples"; exit 0; fi
          git commit -m "probe: venue format samples $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          for i in 1 2 3 4 5; do
            git fetch "$REMOTE" main
            if git rebase FETCH_HEAD; then
              if git push "$REMOTE" HEAD:main; then echo "ok"; exit 0; fi
            else git rebase --abort || true; fi
            sleep $((RANDOM % 5 + i))
          done
          echo "::error::push failed"; exit 1
