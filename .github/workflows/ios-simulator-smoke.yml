name: iOS Simulator Smoke (nightly)

# L2: 実 iOS Simulator (Safari WebKit) で smoke。public repo なら macOS runner も無料。
#   nightly cron + workflow_dispatch のみ実行（毎 PR は L1 WebKit smoke で十分）

on:
  schedule:
    - cron: '0 18 * * *'    # JST 03:00 (= UTC 18:00)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-simulator-smoke:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: build/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: List available iOS Simulator runtimes & devicetypes
        run: |
          echo "=== runtimes ==="
          xcrun simctl list runtimes
          echo "=== devicetypes (iPhone のみ抜粋) ==="
          xcrun simctl list devicetypes | grep -E "iPhone" || true

      - name: Boot iOS Simulator (iPhone, latest available)
        # 2026-05-24: 旧版は `iPhone 15` 固定 + 失敗時 `|| true` で UDID が空のまま
        #   下流 step (`xcrun simctl openurl ""` 等) が必ず失敗する構造だった。
        #   macos-latest が macOS 15 / Xcode 16 へ移行して iPhone 15 が
        #   devicetypes から消えた / iOS runtime が pre-install されていない等の
        #   ケースで silent failure → 2分台での fail。
        # 改善:
        #   - DEVICE 候補リストを順に試す (iPhone 16 > 15 > 14 > 13)
        #   - RUNTIME が取れなかったら明示的に fail (xcrun --version 含めて diag)
        #   - UDID が空なら fail-fast、後続 step を走らせない
        run: |
          set -euo pipefail
          # 利用可能な最新の iOS runtime を選ぶ (identifier フィールド = 最終列)
          RUNTIME=$(xcrun simctl list runtimes | grep -E "^iOS [0-9]+\.[0-9]+" | tail -1 | awk '{print $NF}')
          if [ -z "$RUNTIME" ]; then
            echo "::error::No iOS runtime available on this runner"
            xcrun --version
            sw_vers
            exit 1
          fi
          echo "::notice::Using runtime: $RUNTIME"

          UDID=""
          for DEVICE_NAME in "iPhone 16" "iPhone 15" "iPhone 14" "iPhone 13"; do
            echo "trying device: $DEVICE_NAME"
            if NEW_UDID=$(xcrun simctl create "br-test" "$DEVICE_NAME" "$RUNTIME" 2>/dev/null); then
              UDID="$NEW_UDID"
              echo "::notice::created $DEVICE_NAME UDID=$UDID"
              break
            fi
          done

          if [ -z "$UDID" ]; then
            echo "::error::All device candidates failed; runtime=$RUNTIME"
            xcrun simctl list devicetypes | grep -E "iPhone" || true
            exit 1
          fi

          xcrun simctl boot "$UDID"
          echo "BR_SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Start static HTTP server
        run: |
          python3 -m http.server 8181 &
          echo $! > /tmp/server.pid
          sleep 2

      - name: Open URL in Simulator Safari
        run: |
          xcrun simctl openurl "$BR_SIM_UDID" 'http://127.0.0.1:8181/index.html'
          sleep 8

      - name: Capture screenshot
        run: |
          mkdir -p artifacts
          xcrun simctl io "$BR_SIM_UDID" screenshot artifacts/ios-smoke.png
          ls -la artifacts/

      - name: Tap stadium-card area (sanity check via UI Automator-less coords)
        # Simulator の中心付近をタップして動作するか軽く確認。
        # 真の自動化が必要になったら Appium / WebDriverAgent を後フェーズで導入。
        run: |
          # 200,400 はトップカード辺りの座標（プリレンダ込み）
          xcrun simctl io "$BR_SIM_UDID" touch 200 400 || true
          sleep 4
          xcrun simctl io "$BR_SIM_UDID" screenshot artifacts/ios-smoke-after-tap.png

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi

      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-screenshots
          path: artifacts/
          retention-days: 14

      - name: Shutdown Simulator
        if: always()
        run: |
          xcrun simctl shutdown "$BR_SIM_UDID" || true
          xcrun simctl delete "$BR_SIM_UDID" || true
