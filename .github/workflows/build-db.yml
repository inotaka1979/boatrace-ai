name: Build DB from Official Data
on:
  schedule:
    # 毎日 JST 07:00 = UTC 22:00（前日の結果が確定した後）
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動実行可

# PA-4: 既定の権限を最小化（job 単位で必要分だけ昇格）
permissions:
  contents: read

concurrency:
  group: build-db
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # PA-4: チェックアウト時にトークンを .git/config に残さない
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/build_db.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          # REDESIGN.md Phase 1: silent success 撲滅
          if git diff --staged --quiet; then
            echo "::notice::no data changes to commit"
          else
            git commit -m "db: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          fi
