name: Scrape Previews
# 2026-05-07: Cloudflare Worker (boatrace-scrape-trigger) が primary。
# こちらの cron は Cloudflare 障害時の安全網。
# 2026-05-16: Worker GITHUB_TOKEN 未設定で sileent halt 発覚 + 30 分間隔では
#             展示窓 (レース開始 15 分前〜直前) を取り逃し、previews.boats が
#             空のまま「⏳ 展示航走後に更新されます」が出続ける障害。
#             odds と同じ 5 分間隔に短縮（2 分オフセットで odds と分散）。
on:
  workflow_dispatch:
  schedule:
    # JST 08:02–22:57 を 5 分間隔（2,7,12,...）。odds の */5 と 2 分オフセット
    - cron: '2-59/5 23,0-13 * * *'

# PA-4: 既定権限を最小化
permissions:
  contents: read

concurrency:
  group: scrape-previews
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_previews.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          # REDESIGN.md Phase 1: silent success 撲滅
          if git diff --staged --quiet; then
            echo "::notice::no data changes to commit (freshness check will validate)"
          else
            git commit -m "previews: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git push "$REMOTE" HEAD:main || (git pull --rebase origin main && git push "$REMOTE" HEAD:main)
          fi
      # REDESIGN.md Phase 1: scrape 直後の鮮度検証 (strict)
      - name: Verify data freshness
        if: always()
        run: |
          python3 scripts/check_freshness.py \
            data/previews/today.json \
            --max-age-min 60 \
            --strict
