name: Scrape Previews
# 2026-05-07: Pi 撤去で GHA を primary 化。5 分間隔（cron 遅延込で実効 5–15 分）。
# scrape_previews.py は smart scheduler で展示+結果も取得し data/previews/today.json
# に統合する。data/results/today.json は scrape-results.yml が別途更新。
on:
  workflow_dispatch:
  schedule:
    # JST 08:00–22:00 を 5 分間隔でカバー、odds (:00) と offset +1 で push 衝突回避
    - cron: '1-59/5 23,0-13 * * *'

# PA-4: 既定権限を最小化
permissions:
  contents: read

concurrency:
  group: scrape-previews
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_previews.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          git diff --staged --quiet && exit 0
          git commit -m "previews: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push "$REMOTE" HEAD:main || (git pull --rebase origin main && git push "$REMOTE" HEAD:main)
