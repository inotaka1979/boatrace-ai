name: Scrape Previews
on:
  schedule:
    # JST 09:00-21:00 (UTC 00:00-12:00) に5分間隔
    - cron: '*/5 0-12 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [refresh-previews]

concurrency:
  group: scrape-previews
  cancel-in-progress: true
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_previews.py
      - name: Commit
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          git diff --staged --quiet || git commit -m "previews: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || (git pull --rebase origin main && git push)
