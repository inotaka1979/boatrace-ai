name: Scrape Previews
# Pi primary (3 分粒度の cron_scrape.sh) + GHA backup (15 分粒度) の二重化。
# Pi が落ちても OpenAPI fallback (~30 分) より早く finished/exhibition を反映する。
# 競合: 両者の commit & push は git pull --rebase + retry で吸収。
on:
  workflow_dispatch:
  schedule:
    # JST 08:00–22:00 を 15 分間隔でカバー（UTC 23 から翌日 13 までの 15 時間）
    - cron: '5,20,35,50 23,0-13 * * *'

# PA-4: 既定権限を最小化
permissions:
  contents: read

concurrency:
  group: scrape-previews
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_previews.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          git diff --staged --quiet && exit 0
          git commit -m "previews: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push "$REMOTE" HEAD:main || (git pull --rebase origin main && git push "$REMOTE" HEAD:main)
