name: Scrape Previews
# 2026-05-07: Cloudflare Worker (boatrace-scrape-trigger) が primary。
# こちらの cron は Cloudflare 障害時の安全網（30 分間隔、odds と offset +15）。
on:
  workflow_dispatch:
  schedule:
    # JST 08:15–22:45 を 30 分間隔（:15/45、odds :00/30 と push 衝突回避）
    - cron: '15,45 23,0-13 * * *'

# PA-4: 既定権限を最小化
permissions:
  contents: read

concurrency:
  group: scrape-previews
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/scrape_previews.py
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          git diff --staged --quiet && exit 0
          git commit -m "previews: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push "$REMOTE" HEAD:main || (git pull --rebase origin main && git push "$REMOTE" HEAD:main)
