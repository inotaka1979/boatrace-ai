name: Scrape All (unified - archive role)

# Path C / D3a (2026-05-17): 役割の明確化。
#   旧: Worker と並走しデータ供給 (5 分間隔)
#   新: アーカイブ専用 (30 分間隔)。リアルタイムデータは Cloudflare Worker /api/* が担当。
#       本 workflow は GitHub Pages の data/*.json を履歴保管・障害時 fallback として維持。
#
# rt-fix3 (2026-06-27): オッズもクライアント側でオンデマンド化 (Worker /odds-proxy)。
#   data/odds/today.json は cold-start / fallback の種に降格し、表示中レースの EV/買い目は
#   実時間オッズで計算される。本 cron の発火頻度（GitHub の間引きで 4-6 回/日）が
#   ユーザー体感の鮮度を律速しない設計になった。即時更新は workflow_dispatch を使う。
#
#   スクリプト構成 (scrape_all.py 内の JST 時刻分岐):
#   - 常時 (8-22 JST):    odds + previews (アーカイブ)
#   - 30 分境界:           results
#   - 09:30, 12:00 JST:    racedata + schedule
#   - 08:00 JST:           tide + schedule

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: '全 scraper を強制実行'
        required: false
        default: 'false'
  # path filter: scrape_*.py / scrape-all.yml 変更時のみ発火 (data/ commit では発火しない)
  push:
    branches: [main]
    paths:
      - 'scripts/scrape_all.py'
      - 'scripts/scrape_previews.py'
      - 'scripts/scrape_odds_fast.py'
      - 'scripts/scrape_results.py'
      - '.github/workflows/scrape-all.yml'
  schedule:
    # D3a (2026-05-17): 5 分→30 分間隔。Worker が主データ供給、本 cron はアーカイブ。
    # rt-fix2 P2-B (2026-06-11): 30 分毎宣言 → 1 日 6 アンカーへ「正直化」。
    #   実測 (6/7-6/11) で GitHub は本リポジトリの schedule を 1 workflow あたり
    #   4-6 回/日しか発火させず（30 分毎宣言でも設計比 13-21%）、宣言密度と実発火数は
    #   無相関だった。密な宣言はキュー滞留チケットの数時間遅れ消化・cancelled run・
    #   「30 分毎のはずなのに」という誤った期待を生むだけなので、実態に合わせた
    #   アンカーに削減する。リアルタイム供給は Cloudflare Worker /api/* が担い、
    #   本 workflow は履歴アーカイブ + 障害時 fallback (B18 dispatch で catch-up 可)。
    - cron: '30 23 * * *'        # JST 8:30 (UTC 23:30) 朝イチ・上流 publish 後
    - cron: '0 1 * * *'          # JST 10:00
    - cron: '0 4 * * *'          # JST 13:00
    - cron: '0 7 * * *'          # JST 16:00
    - cron: '0 10 * * *'         # JST 19:00
    - cron: '0 13 * * *'         # JST 22:00 ナイター終盤

permissions:
  contents: read

concurrency:
  group: scrape-all
  # D7-v3 (2026-05-17): cancel-in-progress を false に。理由:
  #   racedata fetch (~30 min) 中に次の cron (30 分間隔) が発火すると
  #   旧 run が cancel され、commit step が走らず racedata がコミットされない。
  #   結果として 11 日連続で racedata が更新されない事故。
  #   queue にすれば 1 つ目が完走 → commit → 2 つ目は freshness gate で
  #   skip して 5-6 min で完了 → 自然に追いつく。
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # D7 (2026-05-17): racedata stale 復旧時は GHA 上で 25-30 min + odds 5 min
    #   + buffer で 50 min が必要。通常運用 (racedata fresh) は 5-6 min。
    timeout-minutes: 50
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Run unified scrape
        run: |
          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            python scripts/scrape_all.py --force-all
          else
            python scripts/scrape_all.py
          fi
      # B3 鮮度ゲート: commit 前にデータが本日のものであることを確認
      # racedata は更新頻度が低いため除外、odds/previews/results は厳格 check
      - name: Verify data freshness (gate)
        run: |
          set +e
          stale=0
          for f in data/odds/today.json data/previews/today.json; do
            if [ -f "$f" ]; then
              python3 scripts/check_freshness.py "$f" --max-age-min 30 --strict || stale=$((stale+1))
            fi
          done
          # results は試合終了レースが累積するので max-age 緩い
          if [ -f data/results/today.json ]; then
            python3 scripts/check_freshness.py data/results/today.json --max-age-min 360 || true
          fi
          if [ $stale -gt 0 ]; then
            echo "::warning::$stale data file(s) failed freshness gate"
          fi
          # gate failure は warning に留め commit はする (watchdog が拾う)
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          # 2026-06-04 (rt-fix P0-2/3): commit-first + rebase --abort で
          #   「rebase 衝突→exit 1→commit 喪失」を根絶。
          #   index.html (prerender) は git add 対象から除外し、唯一の
          #   非マージ衝突源を排除（index.html は skeleton + JS render で表示）。
          git config rebase.autoStash true
          git add data/
          # rt-fix3 (2026-06-27): data/schedule/next_open.json は refresh-next-open.yml の
          #   単独所有。scrape-all もこれを commit すると、両ワークフローが同一の再生成 JSON を
          #   別々に書くため rebase 衝突が「固定化」し、abort+retry を 5 回繰り返しても解消せず
          #   push が連続失敗 → アーカイブが更新停止する（実障害: 06-26 15:22 以降 push fail 継続、
          #   data/ が ~20h stale）。scrape-all 側では commit 対象から外し、二重書込を解消する。
          #   （scrape_all.py の schedule(quick) は next_open.json のみ生成するため実害なし。）
          git reset -q -- data/schedule/next_open.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "::notice::no data changes to commit"
            exit 0
          fi
          git commit -m "scrape: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          for i in 1 2 3 4 5; do
            git fetch "$REMOTE" main
            if git rebase FETCH_HEAD; then
              if git push "$REMOTE" HEAD:main; then
                echo "push ok (attempt $i)"
                exit 0
              fi
              echo "push rejected (attempt $i) — refetch & retry"
            else
              echo "rebase conflict (attempt $i) — abort & retry (data files are append-only/regenerated)"
              git rebase --abort || true
            fi
            sleep $((RANDOM % 5 + i))
          done
          echo "::error::push failed after 5 attempts"
          exit 1
