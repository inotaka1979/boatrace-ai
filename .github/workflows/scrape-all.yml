name: Scrape All (unified)

# Path B (2026-05-16): 5 つに分散していた scrape workflow を 1 本に統合
#   scripts/scrape_all.py が JST 時刻で実行 scraper を分岐
#   - 常時 (8-22 JST): odds + previews
#   - 30 分境界: results
#   - 09:30, 12:00 JST: racedata + schedule
#   - 08:00 JST: tide + schedule
# 単一 commit / 単一 push で race condition を根絶。
# Cloudflare Worker の workflow_dispatch 依存は撤去済 (PAT 不要)。

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: '全 scraper を強制実行'
        required: false
        default: 'false'
  # 2026-05-16: push トリガを限定追加。cron 登録遅延中の初回起動を強制し、
  #   かつ scrape_all.py / scrape-all.yml 自体の変更時にも即時テスト可能。
  #   path filter で data/ などの自動 commit では発火しないようにする。
  push:
    branches: [main]
    paths:
      - 'scripts/scrape_all.py'
      - 'scripts/scrape_previews.py'
      - 'scripts/scrape_odds_fast.py'
      - 'scripts/scrape_results.py'
      - '.github/workflows/scrape-all.yml'
  schedule:
    # JST 08:00–22:55 を 5 分間隔 (奇数分も含めるためデュアル cron)
    #   UTC 23,0-13 = JST 08-22
    - cron: '*/5 23,0-13 * * *'
    - cron: '2-59/5 23,0-13 * * *'

permissions:
  contents: read

concurrency:
  group: scrape-all
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Run unified scrape
        run: |
          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            python scripts/scrape_all.py --force-all
          else
            python scripts/scrape_all.py
          fi
      # B3 鮮度ゲート: commit 前にデータが本日のものであることを確認
      # racedata は更新頻度が低いため除外、odds/previews/results は厳格 check
      - name: Verify data freshness (gate)
        run: |
          set +e
          stale=0
          for f in data/odds/today.json data/previews/today.json; do
            if [ -f "$f" ]; then
              python3 scripts/check_freshness.py "$f" --max-age-min 30 --strict || stale=$((stale+1))
            fi
          done
          # results は試合終了レースが累積するので max-age 緩い
          if [ -f data/results/today.json ]; then
            python3 scripts/check_freshness.py data/results/today.json --max-age-min 360 || true
          fi
          if [ $stale -gt 0 ]; then
            echo "::warning::$stale data file(s) failed freshness gate"
          fi
          # gate failure は warning に留め commit はする (watchdog が拾う)
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          # data + index.html (prerender skeleton 化後も safe) を staging
          git add data/ index.html || true
          if git diff --staged --quiet; then
            echo "::notice::no data changes to commit"
            exit 0
          fi
          git commit -m "scrape: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          for i in 1 2 3; do
            if git push "$REMOTE" HEAD:main; then
              echo "push ok (attempt $i)"
              exit 0
            fi
            echo "push rejected (attempt $i) — rebase & retry"
            git pull --rebase "$REMOTE" main || exit 1
          done
          exit 1
