# wrangler.toml — Cloudflare Worker 設定 (GitHub Actions 自動デプロイ用)
#
# 2026-05-16 Path B 簡素化:
#   - scheduled() を撤去し GITHUB_TOKEN 依存を根絶
#   - cron トリガも不要 (scrape は GHA cron が単独で担当)
#   - Worker は /odds-proxy + /health の HTTP プロキシのみ

name = "boatrace-scrape-trigger"
main = "worker.js"
compatibility_date = "2024-12-01"

# cron 撤去 (Path B): scrape スケジュールは GHA cron で完結
# [triggers]
# crons = ["*/3 * * * *"]
