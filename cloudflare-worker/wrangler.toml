# wrangler.toml — Cloudflare Worker 設定 (GitHub Actions 自動デプロイ用)
#
# 2026-05-17 Path C 移行:
#   - 独立スクレイプエンジン化 (scheduled + KV binding)
#   - 5 分間隔 cron で boatraceopenapi を fetch → KV に保存
#   - PWA は /api/{previews,programs,results} で KV から取得
#   - GHA 障害の影響を受けない独立データソース

name = "boatrace-scrape-trigger"
main = "worker.js"
compatibility_date = "2024-12-01"

# D1a (2026-05-17): 24/7 動作。レース時間帯は 5 分間隔、深夜帯は 30 分間隔。
#   JST 08:00-22:55 (UTC 23,0-13)        → 5 分間隔
#   JST 23:00-07:55 (UTC 14-22)          → 30 分間隔
#   合計 KV writes/日 ≒ 316 × 3 種 = 948 (無料枠 1000/日 95% 内)
[triggers]
crons = [
  "*/5 23,0-13 * * *",       # JST 8-22: 5 分毎
  "*/30 14-22 * * *",        # JST 23-07: 30 分毎
]

# Path C: KV namespace for scraped data
[[kv_namespaces]]
binding = "BOATRACE_KV"
id = "7834740f2f034a04a54b9bde4078d717"
